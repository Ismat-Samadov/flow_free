<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <!-- Neon flow paths -->
  <line x1="4"  y1="4"  x2="28" y2="4"  stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="4"  x2="28" y2="28" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="4"  y2="28" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4"  y1="28" x2="4"  y2="4"  stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Endpoints (dots) -->
  <circle cx="4"  cy="4"  r="4" fill="#ef4444"/>
  <circle cx="28" cy="4"  r="4" fill="#3b82f6"/>
  <circle cx="28" cy="28" r="4" fill="#4ade80"/>
  <circle cx="4"  cy="28" r="4" fill="#facc15"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3.5" fill="#a855f7"/>
</svg>
